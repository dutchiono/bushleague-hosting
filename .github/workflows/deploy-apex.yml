name: Deploy bushleague.xyz

on:
  push:
    branches: [main]
    paths: ['public/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish apex index
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: public/index.html
          target: /tmp
          overwrite: true

      - name: Install to web root
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            sudo cp /tmp/index.html /var/www/default/index.html
            sudo chmod 644 /var/www/default/index.html
            echo DEPLOY_OK
