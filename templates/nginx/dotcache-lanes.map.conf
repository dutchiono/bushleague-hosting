# nginx snippet — dotcache designer lanes (one-time install on miono)
# Place in /etc/nginx/conf.d/dotcache-lanes.map.conf or include from dotcache server block

map $host $dotcache_lane_root {
    default                                              /var/www/dotcache/dist;
    dotcache.bushleague.xyz                              /var/www/dotcache/dist;
    ~^(?<lane>[^.]+)\.dotcache\.bushleague\.xyz$       /var/www/dotcache/lanes/$lane/dist;
}

# In server block for dotcache.bushleague.xyz *.dotcache.bushleague.xyz:
#   root $dotcache_lane_root;
#
# TLS: issue wildcard cert for *.dotcache.bushleague.xyz before lanes go live.
